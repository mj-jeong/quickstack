name: CI Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "18"
  PNPM_VERSION: "10.23.0"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Quality Checks (TypeScript, ESLint, Jest)
  # ──────────────────────────────────────────────────────────────────────────
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint check
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test --passWithNoTests
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/pmo_test"
          AUTH_SECRET: "ci-test-auth-secret-minimum-32-characters-long"
          NEXTAUTH_URL: "http://localhost:3000"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          LLM_MODE: "mock"
          NODE_ENV: "test"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Build Verification
  # ──────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/pmo_test"
      AUTH_SECRET: "ci-test-auth-secret-minimum-32-characters-long"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
      LLM_MODE: "mock"
      NODE_ENV: "production"
      CI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application
        run: pnpm build

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Security Audit
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level high
        continue-on-error: true

# ──────────────────────────────────────────────────────────────────────────
# Note: Railway auto-deploys when code is pushed to the connected branch.
#   - staging branch  -> Railway Staging environment (auto-deploy)
#   - main branch     -> Railway Production environment (auto-deploy)
#
# No explicit deploy job is required here when Railway GitHub integration
# is configured via the Railway dashboard.
# ──────────────────────────────────────────────────────────────────────────
